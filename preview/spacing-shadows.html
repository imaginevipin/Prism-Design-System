<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-Medium.otf") format("opentype"); font-weight: 500; }
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-Regular.otf") format("opentype"); font-weight: 400; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PP Neue Montreal", sans-serif; background: #fff; padding: 20px 24px; }
  .wrap { display: flex; gap: 40px; }
  .section-label { font-size: 11px; font-weight: 600; color: #363636; margin-bottom: 12px; }
  .spacing-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .bar { background: #f9c8b3; height: 8px; border-radius: 2px; }
  .sp-label { font-size: 10px; color: #686868; min-width: 60px; }
  .shadow-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .shadow-box { width: 80px; height: 60px; border-radius: 5px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .shadow-name { font-size: 10px; color: #686868; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="section-label">Spacing — 4px base</div>
    <div style="display:flex;gap:24px">
      <div>
        <div class="spacing-row"><div class="sp-label">0 · 0px</div><div class="bar" style="width:0"></div></div>
        <div class="spacing-row"><div class="sp-label">2 · 8px</div><div class="bar" style="width:8px"></div></div>
        <div class="spacing-row"><div class="sp-label">3 · 12px</div><div class="bar" style="width:12px"></div></div>
        <div class="spacing-row"><div class="sp-label">4 · 16px</div><div class="bar" style="width:16px"></div></div>
        <div class="spacing-row"><div class="sp-label">5 · 20px</div><div class="bar" style="width:20px"></div></div>
        <div class="spacing-row"><div class="sp-label">6 · 24px</div><div class="bar" style="width:24px"></div></div>
        <div class="spacing-row"><div class="sp-label">7 · 32px</div><div class="bar" style="width:32px"></div></div>
        <div class="spacing-row"><div class="sp-label">8 · 40px</div><div class="bar" style="width:40px"></div></div>
      </div>
      <div>
        <div class="spacing-row"><div class="sp-label">9 · 48px</div><div class="bar" style="width:48px"></div></div>
        <div class="spacing-row"><div class="sp-label">10 · 64px</div><div class="bar" style="width:64px"></div></div>
        <div class="spacing-row"><div class="sp-label">11 · 80px</div><div class="bar" style="width:80px"></div></div>
        <div class="spacing-row"><div class="sp-label">12 · 120px</div><div class="bar" style="width:120px"></div></div>
      </div>
    </div>
  </div>
  <div>
    <div class="section-label">Shadows</div>
    <div class="shadow-grid">
      <div style="text-align:center">
        <div class="shadow-box" style="box-shadow:0px 0px 10px rgba(0,0,0,0.15)"></div>
        <div class="shadow-name">100 · Menus</div>
      </div>
      <div style="text-align:center">
        <div class="shadow-box" style="box-shadow:0px 0px 40px rgba(0,0,0,0.20)"></div>
        <div class="shadow-name">200 · Standard</div>
      </div>
      <div style="text-align:center">
        <div class="shadow-box" style="box-shadow:0px 0px 20px rgba(0,0,0,0.25)"></div>
        <div class="shadow-name">300 · Dragging</div>
      </div>
      <div style="text-align:center">
        <div class="shadow-box" style="box-shadow:0px 0px 40px rgba(0,0,0,0.25)"></div>
        <div class="shadow-name">400 · Overlays</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
