<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-Medium.otf") format("opentype"); font-weight: 500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PP Neue Montreal", sans-serif; background: #fff; padding: 20px 24px; }
  .row { display: flex; gap: 16px; }
  .col { flex: 1; }
  .col-label { font-size: 11px; font-weight: 600; color: #363636; margin-bottom: 8px; }
  .scale { display: flex; gap: 4px; margin-bottom: 8px; }
  .swatch { flex: 1; height: 32px; border-radius: 3px; border: 1px solid #f0f0f0; }
  .chips { display: flex; flex-direction: column; gap: 2px; }
  .chip { display: flex; align-items: center; gap: 8px; }
  .chip-sq { width: 28px; height: 16px; border-radius: 2px; border: 1px solid #f0f0f0; flex-shrink: 0; }
  .chip span { font-size: 10px; color: #686868; }
</style>
</head>
<body>
  <div class="row">
    <div class="col">
      <div class="col-label">Dark scale</div>
      <div class="scale">
        <div class="swatch" style="background:#f7f7f7"></div>
        <div class="swatch" style="background:#efefef"></div>
        <div class="swatch" style="background:#e3e3e3"></div>
        <div class="swatch" style="background:#c8c8c8"></div>
        <div class="swatch" style="background:#363636;border-color:#363636"></div>
        <div class="swatch" style="background:#262626;border-color:#262626"></div>
        <div class="swatch" style="background:#1a1a1a;border-color:#1a1a1a"></div>
        <div class="swatch" style="background:#181818;border-color:#181818"></div>
        <div class="swatch" style="background:#171717;border-color:#171717"></div>
      </div>
      <div class="chips">
        <div class="chip"><div class="chip-sq" style="background:#f7f7f7"></div><span>100 · #f7f7f7</span></div>
        <div class="chip"><div class="chip-sq" style="background:#363636;border-color:#555"></div><span>500 · #363636 ← <strong>main text</strong></span></div>
        <div class="chip"><div class="chip-sq" style="background:#171717;border-color:#555"></div><span>900 · #171717 ← deepest</span></div>
      </div>
    </div>
    <div class="col">
      <div class="col-label">Light / gray scale</div>
      <div class="scale">
        <div class="swatch" style="background:#fbfbfb"></div>
        <div class="swatch" style="background:#f9f9f9"></div>
        <div class="swatch" style="background:#f7f7f7"></div>
        <div class="swatch" style="background:#e1e1e1"></div>
        <div class="swatch" style="background:#d9d9d9"></div>
        <div class="swatch" style="background:#afafaf"></div>
        <div class="swatch" style="background:#787878"></div>
        <div class="swatch" style="background:#727272"></div>
        <div class="swatch" style="background:#686868"></div>
      </div>
      <div class="chips">
        <div class="chip"><div class="chip-sq" style="background:#fbfbfb"></div><span>100 · #fbfbfb</span></div>
        <div class="chip"><div class="chip-sq" style="background:#e1e1e1"></div><span>400 · #e1e1e1 ← borders</span></div>
        <div class="chip"><div class="chip-sq" style="background:#787878;border-color:#555"></div><span>700 · #787878 ← <strong>subtext / captions / body</strong></span></div>
      </div>
    </div>
  </div>
</body>
</html>
