<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-Medium.otf") format("opentype"); font-weight: 500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PP Neue Montreal", sans-serif; background: #fff; padding: 20px 24px; }
  .section { margin-bottom: 16px; }
  .section-label { font-size: 10px; font-weight: 600; color: #686868; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .icons { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .icon-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .icon-box { width: 40px; height: 40px; border-radius: 5px; background: #f7f7f7; display: flex; align-items: center; justify-content: center; }
  .icon-box img { width: 20px; height: 20px; }
  .icon-name { font-size: 9px; color: #afafaf; text-align: center; max-width: 44px; }
  /* Inline SVG icons */
  .icon-svg { width: 24px; height: 24px; fill: #363636; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Custom SVG icons — 24×24px</div>
    <div class="icons">
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/edit.svg" alt="edit" style="filter:brightness(0.2)"></div><div class="icon-name">Edit</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/favourite.svg" alt="fav" style="filter:brightness(0.2)"></div><div class="icon-name">Favourite</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/generate.svg" alt="gen" style="filter:brightness(0.2)"></div><div class="icon-name">Generate</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/list.svg" alt="list" style="filter:brightness(0.2)"></div><div class="icon-name">List</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/present.svg" alt="present" style="filter:brightness(0.2)"></div><div class="icon-name">Present</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/attach.svg" alt="attach" style="filter:brightness(0.2)"></div><div class="icon-name">Attach</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/drag.svg" alt="drag" style="filter:brightness(0.2)"></div><div class="icon-name">Drag</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/settings.svg" alt="settings" style="filter:brightness(0.2)"></div><div class="icon-name">Settings</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/magic-brush.svg" alt="magic" style="filter:brightness(0.2)"></div><div class="icon-name">Magic Brush</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/sparkle.svg" alt="sparkle" style="filter:brightness(0)"></div><div class="icon-name">Sparkle</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/sparkle-bold.svg" alt="sparkle-bold" style="filter:brightness(0)"></div><div class="icon-name">Sparkle Bold</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/draw.svg" alt="draw" style="filter:brightness(0.2)"></div><div class="icon-name">Draw</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/request.svg" alt="request" style="filter:brightness(0.2)"></div><div class="icon-name">Request</div></div>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Social icons</div>
    <div class="icons">
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/discord.svg" alt="discord" style="filter:brightness(0)"></div><div class="icon-name">Discord</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/instagram.svg" alt="instagram" style="filter:brightness(0)"></div><div class="icon-name">Instagram</div></div>
      <div class="icon-item"><div class="icon-box"><img src="../assets/icons/linkedin.svg" alt="linkedin" style="filter:brightness(0)"></div><div class="icon-name">LinkedIn</div></div>
    </div>
  </div>
  <div style="font-size:10px;color:#afafaf;margin-top:4px">All icons 24×24px · Custom SVG set · Material Design–derived · Color: #363636 on light, #fff on dark/papaya</div>
</body>
</html>
