<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-Regular.otf") format("opentype"); font-weight: 400; }
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-Medium.otf") format("opentype"); font-weight: 500; }
  @font-face { font-family: "PP Neue Montreal"; src: url("../fonts/PPNeueMontreal-SemiBold.otf") format("opentype"); font-weight: 600; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PP Neue Montreal", sans-serif; background: #fff; padding: 20px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid #f7f7f7; }
  .meta { min-width: 130px; font-size: 10px; color: #686868; }
  .sample { color: #171717; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">H1 · 45px · 600</div>
    <div class="sample" style="font-size:45px;font-weight:600">Heading 1</div>
  </div>
  <div class="row">
    <div class="meta">H2 · 37px · 600</div>
    <div class="sample" style="font-size:37px;font-weight:600">Heading 2</div>
  </div>
  <div class="row">
    <div class="meta">H3 · 31px · 600</div>
    <div class="sample" style="font-size:31px;font-weight:600">Heading 3</div>
  </div>
  <div class="row">
    <div class="meta">H4 · 26px · 600</div>
    <div class="sample" style="font-size:26px;font-weight:600">Heading 4</div>
  </div>
  <div class="row">
    <div class="meta">Title 1 · 22px · 500</div>
    <div class="sample" style="font-size:22px;font-weight:500;letter-spacing:0.01em">Title one</div>
  </div>
  <div class="row">
    <div class="meta">Title 2 · 18px · 500</div>
    <div class="sample" style="font-size:18px;font-weight:500;letter-spacing:0.01em">Title two</div>
  </div>
  <div class="row">
    <div class="meta">Body · 15px · 400/500</div>
    <div class="sample" style="font-size:15px;font-weight:400;letter-spacing:0.01em">Body regular &nbsp;<span style="font-weight:500">Body medium</span></div>
  </div>
  <div class="row">
    <div class="meta">Caption · 12px · 400</div>
    <div class="sample" style="font-size:12px;font-weight:400">Caption text</div>
  </div>
  <div class="row" style="border-bottom:none">
    <div class="meta">Label · 10px · 500 UP</div>
    <div class="sample" style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em">LABEL TEXT</div>
  </div>
</body>
</html>
